kind = "web"
previewPath = "/"
title = "Tool Tracker"
version = "1.0.0"
id = "artifacts/tool-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19767

[services.development]
run = "pnpm --filter @workspace/tool-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tool-tracker", "run", "build" ]
publicDir = "artifacts/tool-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19767"
BASE_PATH = "/"
